# Production overrides. Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Single domain: web at https://<domain>, API at https://<domain>/api.
# Traefik uses the FILE provider (infra/traefik/dynamic.yml) instead of the Docker
# provider — the Docker provider pins API 1.24 which newer daemons reject. Routing
# targets containers by their compose DNS names (web, api) over the shared network.
#
# Requires in .env: ACME_EMAIL and the prod URLs
#   PANEL_PUBLIC_URL=https://<domain>/api
#   WEB_PUBLIC_URL=https://<domain>
#   NEXT_PUBLIC_API_URL=https://<domain>/api
#   CORS_ORIGINS=https://<domain>
# The domain itself is set in infra/traefik/dynamic.yml.

services:
  postgres:
    ports: []

  redis:
    ports: []

  api:
    ports: []
    environment:
      NODE_ENV: production

  web:
    ports: []
    environment:
      NODE_ENV: production

  traefik:
    command:
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      - "--certificatesresolvers.le.acme.tlschallenge=true"
      - "--certificatesresolvers.le.acme.email=${ACME_EMAIL:-admin@example.com}"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - letsencrypt:/letsencrypt
      - ./infra/traefik:/etc/traefik/dynamic:ro

volumes:
  letsencrypt:
